<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Message-chat</title>
		<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

<body style="
background-color: #1e1f24;
">

<!-- #1e1f24 message color -->
<!-- #121318; bg color -->

<header class="header-messageRoom">

	<div class="back-icon">
		<a href="index.html">

	</div>

		<img src="images/settings-icon.png">
	</div>
</header>

<div class="body-chat round">
	<div class="body-chat-inner">

			<h2>
				DPMK, a.s.<br>
				SMS prestupny CL<br>

				<span><!-- time --></span>

				<span><!-- time + one hour --></span><br>
				<span><!-- random string letter and num --></span>
			</h2>
		</div>

		<div class="time-active">
			<p><!-- time --></p>
		</div>

			<h2>

					<!-- custom text -->

			</div>
		</div>

		<div class="message-response round">
			<h2>

				1.50 EUR.<br>
				Platnost od<br>

				<span><!-- today date dd/mm/yy --></span>

				<span><!-- random string letter and num --></span>

		</div>
		<img style="
		margin-right: 15px;
		" src="images/emoji-icon.png">

	</div>
</div>
